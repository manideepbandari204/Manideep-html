<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bank App</title>
</head>

<body>
    <header>
        <center>
            <h1>
                <Font color="orange">Manideep</Font>
                <Font color="blue">Bank</Font>
            </h1>
            <a href="index.html">About Bank</a> |
            <a href="customerRegistrationForm.html">Customer Registration Form</a> |
            <a href="EMI Calculator.html">EMI Calculator</a> |
            <a href="Open New Bank Account.html">Open New Bank Account</a> |
            <a href="Customer Profile Update.html">Customer Profile Update</a> |
            <a href="Internet Bank Login.html">Internet Banking Login</a> |
            <a href="Credit Card Application.html">Credit Card Application</a> |
            <a href="Loan Eligibility Check.html">Loan Eligibility Check</a> |
            <a href="Branch feedback.html">Branches Feedback</a>
        </center>
    </header>
    <hr>
    <main>
        <br>
        <center>
            <form>
                <table border="1" cellpadding="10">
                    <caption>
                        <h2>Loan Eligibility Check</h2>
                    </caption>
                    <tr>
                        <td><label>Name</label></td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td><label>Annual Income</label></td>
                        <td><input type="number"></td>
                    </tr>
                    <tr>
                        <td>Existing EMI</td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td><label>Employment</label></td>
                        <td>
                            <input type="radio">Salaried
                            <input type="radio">Business
                        </td>
                    </tr>
                    <tr>
                        <td><label>Loan Type</label></td>
                        <td>
                            <select>
                                <option>Home</option>
                                <option>Personal</option>
                                <option>Car</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label>Loan Ammount</label></td>
                        <td><input type="number"></td>
                    </tr>
                    <tr>
                        <td><label>Start Date</label></td>
                        <td><input type="date"></td>
                    </tr>
                    <tr>
                        <td><label>Purpose</label></td>
                        <td><textarea></textarea></td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Check Eligibility">
                        </td>
                    </tr>
                </table>
            </form>
        </center>
        <br><br>
    </main>
    <hr>
    <footer>
        <h3>
            <center>
                <Font color="green">copyright@manideep</Font>
            </center>
        </h3>
    </footer>
</body>

</html>
