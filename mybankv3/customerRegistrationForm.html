
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bank App</title>
</head>

<body>
    <header>
        <center>
            <h1>
                <Font color="orange">Manideep</Font>
                <Font color="blue">Bank</Font>
            </h1>
            <a href="index.html">About Bank</a> |
            <a href="customerRegistrationForm.html">Customer Registration Form</a> |
            <a href="EMI Calculator.html">EMI Calculator</a> |
            <a href="Open New Bank Account.html">Open New Bank Account</a> |
            <a href="Customer Profile Update.html">Customer Profile Update</a> |
            <a href="Internet Bank Login.html">Internet Banking Login</a> |
            <a href="Credit Card Application.html">Credit Card Application</a> |
            <a href="Loan Eligibility Check.html">Loan Eligibility Check</a> |
            <a href="Branch feedback.html">Branches Feedback</a>
        </center>
    </header>
    <hr>
    <main>
        <br>
        <center>
            <form>
            <table border="1" cellpadding="10">
                <caption>
                    <h2>Customer Registration Form</h2>
                </caption>
                <tr>
                    <td><label>Customer Name</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label>Password</label></td>
                    <td><input type="password"></td>
                </tr>
                <tr>
                    <td><label>Confirm Password</label></td>
                    <td><input type="password"></td>
                </tr>
                <tr>
                    <td><label>Email</label></td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td><label>Mobile</label></td>
                    <td><input type="tel"></td>
                </tr>
                <tr>
                    <td><label>Date of Birth</label></td>
                    <td><input type="date"></td>
                </tr>
                <tr>
                    <td><label>Gender</label></td>
                    <td>
                        <input type="radio" name="gender" id="male" value="MALE">Male
                        <input type="radio" name="gender" id="female" value="FEMALE">Female
                    </td>
                </tr>
                <tr>
                    <td><label>Account Type</label></td>
                    <td>
                        <select>
                            <option>Saving</option>
                            <option>Current</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label>Aadhar Number</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label>PAN Upload</label></td>
                    <td><input type="file"></td>
                </tr>
                <tr>
                    <td><label>Address</label></td>
                    <td><textarea name="address"></textarea></td>
                </tr>
                <tr>
                    <td><label>Terms</label></td>
                    <td><input type="checkbox"> I Agree</td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
            </form>
        </center>
        <br>
    </main>
    <hr>
    <footer>
        <h3>
            <center>
                <Font color="green">copyright@manideep</Font>
            </center>
        </h3>
    </footer>
</body>

</html>
