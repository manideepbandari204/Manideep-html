<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bank App</title>
</head>

<body>
    <header>
        <center>
            <h1>
                <Font color="orange">Manideep</Font>
                <Font color="blue">Bank</Font>
            </h1>
            <a href="index.html">About Bank</a> |
            <a href="customerRegistrationForm.html">Customer Registration Form</a> |
            <a href="EMI Calculator.html">EMI Calculator</a> |
            <a href="Open New Bank Account.html">Open New Bank Account</a> |
            <a href="Customer Profile Update.html">Customer Profile Update</a> |
            <a href="Internet Bank Login.html">Internet Banking Login</a> |
            <a href="Credit Card Application.html">Credit Card Application</a> |
            <a href="Loan Eligibility Check.html">Loan Eligibility Check</a> |
            <a href="Branch feedback.html">Branches Feedback</a>
        </center>
    </header>
    <hr>
    <main>
        <br>
        <center>
            <form action="acbserver" method="post">
                <table border="1" cellpadding="10">
                    <caption>
                        <h2>Branch feedback</h2>
                    </caption>
                    <tr>
                        <td><label for="name">Name</label></td>
                        <td><input type="text" id="name" name="name"></td>
                    </tr>
                    <tr>
                        <td><label for="mail">Email</label></td>
                        <td><input type="email" id="mail" name="mail"></td>
                    </tr>
                    <tr>
                        <td><label for="branch">Branch</label></td>
                        <td>
                            <select id="branch" name="branch">
                                <option>Hyderabad</option>
                                <option>Chennai</option>
                                <option>Bangalore</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="visitDate">Visit Date</label></td>
                        <td>
                            <input type="date" id="visitDate" name="visitDate">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="rating">Rating</label></td>
                        <td>
                            <input type="radio" name="rating" value="excellent" id="excellent">
                            <label for="excellent">Excellent</label>
                            <input type="radio" name="rating" value="good" id="good">
                            <label for="good">Good</label>
                            <input type="radio" name="rating" value="average" id="average">
                            <label for="average">Average</label>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="services">Service Used</label></td>
                        <td>
                            <input type="checkbox" name="services" value="atm" id="atm">
                            <label for="atm">ATM</label>
                            <input type="checkbox" name="services" value="loan" id="loan">
                            <label for="loan">Loan</label>
                            <input type="checkbox" name="services" value="account" id="account">
                            <label for="account">Account</label>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="suggestions">Suggestions</label></td>
                        <td><textarea id="suggestions" name="suggestions"></textarea></td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Submit">
                            <input type="reset" value="Reset">
                        </td>
                    </tr>
                </table>
            </form>
        </center>
        <br><br><br><br><br>
    </main>
    <hr>
    <footer>
        <h3>
            <center>
                <Font color="green">copyright@manideep</Font>
            </center>
        </h3>
    </footer>
</body>

</html>
