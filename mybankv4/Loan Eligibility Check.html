<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bank App</title>
</head>

<body>
    <header>
        <center>
            <h1>
                <Font color="orange">Manideep</Font>
                <Font color="blue">Bank</Font>
            </h1>
            <a href="index.html">About Bank</a> |
            <a href="customerRegistrationForm.html">Customer Registration Form</a> |
            <a href="EMI Calculator.html">EMI Calculator</a> |
            <a href="Open New Bank Account.html">Open New Bank Account</a> |
            <a href="Customer Profile Update.html">Customer Profile Update</a> |
            <a href="Internet Bank Login.html">Internet Banking Login</a> |
            <a href="Credit Card Application.html">Credit Card Application</a> |
            <a href="Loan Eligibility Check.html">Loan Eligibility Check</a> |
            <a href="Branch feedback.html">Branches Feedback</a>
        </center>
    </header>
    <hr>
    <main>
        <br>
        <center>
            <form action="abcdserver" method="post">
                <table border="1" cellpadding="10">
                    <caption>
                        <h2>Loan Eligibility Check</h2>
                    </caption>
                    <tr>
                        <td><label for="name">Name</label></td>
                        <td><input type="text" name="name" id="name"></td>
                    </tr>
                    <tr>
                        <td><label for="annualIncome">Annual Income</label></td>
                        <td><input type="number" name="annualIncome" id="annualIncome"></td>
                    </tr>
                    <tr>
                        <td><label for="existingEMI">Existing EMI</label></td>
                        <td><input type="number" name="existingEMI" id="existingEMI"></td>
                    </tr>
                    <tr>
                        <td><label for="employment">Employment</label></td>
                        <td>
                            <input type="radio" name="employment" id="salaried">
                            <label for="salaried">Salaried</label>
                            <input type="radio" name="employment" id="business">
                            <label for="business">Business</label>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="loanType">Loan Type</label></td>
                        <td>
                            <select name="loanType" id="loanType">
                                <option>Home</option>
                                <option>Personal</option>
                                <option>Car</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="loanAmount">Loan Amount</label></td>
                        <td><input type="number" name="loanAmount" id="loanAmount"></td>
                    </tr>
                    <tr>
                        <td><label for="startDate">Start Date</label></td>
                        <td><input type="date" name="startDate" id="startDate"></td>
                    </tr>
                    <tr>
                        <td><label for="purpose">Purpose</label></td>
                        <td><textarea name="purpose" id="purpose"></textarea></td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Check Eligibility">
                        </td>
                    </tr>
                </table>
            </form>
        </center>
        <br><br>
    </main>
    <hr>
    <footer>
        <h3>
            <center>
                <Font color="green">copyright@manideep</Font>
            </center>
        </h3>
    </footer>
</body>

</html>
