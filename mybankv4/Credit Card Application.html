<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bank App</title>
</head>

<body>
    <header>
        <center>
            <h1>
                <Font color="orange">Manideep</Font>
                <Font color="blue">Bank</Font>
            </h1>
            <a href="index.html">About Bank</a> |
            <a href="customerRegistrationForm.html">Customer Registration Form</a> |
            <a href="EMI Calculator.html">EMI Calculator</a> |
            <a href="Open New Bank Account.html">Open New Bank Account</a> |
            <a href="Customer Profile Update.html">Customer Profile Update</a> |
            <a href="Internet Bank Login.html">Internet Banking Login</a> |
            <a href="Credit Card Application.html">Credit Card Application</a> |
            <a href="Loan Eligibility Check.html">Loan Eligibility Check</a> |
            <a href="Branch feedback.html">Branches Feedback</a>
        </center>
    </header>
    <hr>
    <main>
        <center>
            <form action="abcdserver" method="post">
                <table border="1" cellpadding="10">
                    <caption>
                        <h2>Credit Card Application</h2>
                    </caption>
                    <tr>
                        <td>
                            <label for="name">Name</label>
                        </td>
                        <td><input type="text" id="name" name="name"></td>
                        </tr>
                    <tr>
                        <td>
                            <label for="mail">Email</label>
                        </td>
                        <td><input type="email" id="mail" name="mail"></td>
                    </tr>
                    <tr>
                        <td>
                            <label for="phone">Phone</label>
                        </td>
                        <td><input type="tel" id="phone" name="phone"></td>
                    </tr>
                    <tr>
                        <td>
                            <label for="salary">Salary</label>
                        </td>
                        <td><input type="number" id="salary" name="salary"></td>
                    </tr>
                    <tr>
                        <td>
                            <label for="employment">Employment</label>
                        </td>
                        <td>
                            <input type="radio" id="private" name="employment" value="private">
                            <label for="private">Private</label>
                            <input type="radio" id="government" name="employment" value="government">
                            <label for="government">Government</label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="website">Company Website</label>
                        </td>
                        <td><input type="url" id="website" name="website"></td>
                    </tr>
                    <tr>
                        <td>
                            <label for="resume">Resume</label>
                        </td>
                        <td><input type="file" id="resume" name="resume"></td>
                    </tr>
                    <tr>
                        <td>
                            <label for="address">Address</label>
                        </td>
                        <td><textarea id="address" name="address"></textarea></td>
                    </tr>
                    <tr>
                        <td>
                            <label for="cardtype">Card Type</label>
                        </td>
                        <td>
                            <select id="cardtype" name="cardtype">
                                <option>Silver</option>
                                <option>Gold</option>
                                <option>Platinum</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="submit" value="Submit">
                        </td>
                    </tr>
                </table>
            </form>
        </center>
        <br>
    </main>
    <hr>
    <footer>
        <h3>
            <center>
                <Font color="green">copyright@manideep</Font>
            </center>
        </h3>
    </footer>
</body>

</html>
