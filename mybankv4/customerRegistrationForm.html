
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bank App</title>
</head>

<body>
    <header>
        <center>
            <h1>
                <Font color="orange">Manideep</Font>
                <Font color="blue">Bank</Font>
            </h1>
            <a href="index.html">About Bank</a> |
            <a href="customerRegistrationForm.html">Customer Registration Form</a> |
            <a href="EMI Calculator.html">EMI Calculator</a> |
            <a href="Open New Bank Account.html">Open New Bank Account</a> |
            <a href="Customer Profile Update.html">Customer Profile Update</a> |
            <a href="Internet Bank Login.html">Internet Banking Login</a> |
            <a href="Credit Card Application.html">Credit Card Application</a> |
            <a href="Loan Eligibility Check.html">Loan Eligibility Check</a> |
            <a href="Branch feedback.html">Branches Feedback</a>
        </center>
    </header>
    <hr>
    <main>
        <br>
        <center>
            <form action="abcdserver" method="post">
            <table border="1" cellpadding="10">
                <caption>
                    <h2>Customer Registration Form</h2>
                </caption>
                <tr>
                    <td><label for="customerName">Customer Name</label></td>
                    <td><input type="text" id="customerName" name="customerName"></td>
                </tr>
                <tr>
                    <td><label for="password">Password</label></td>
                    <td><input type="password" id="password" name="password"></td>
                </tr>
                <tr>
                    <td><label for="confirmPassword">Confirm Password</label></td>
                    <td><input type="password" id="confirmPassword" name="confirmPassword"></td>
                </tr>
                <tr>
                    <td><label for="email">Email</label></td>
                    <td><input type="email" id="email" name="email"></td>
                </tr>
                <tr>
                    <td><label for="mobile">Mobile</label></td>
                    <td><input type="tel" id="mobile" name="mobile"></td>
                </tr>
                <tr>
                    <td><label for="dateOfBirth">Date of Birth</label></td>
                    <td><input type="date" id="dateOfBirth" name="dateOfBirth"></td>
                </tr>
                <tr>
                    <td><label for="gender">Gender</label></td>
                    <td>
                        <input type="radio" name="gender" id="male" value="MALE"><label for="male">Male</label>
                        <input type="radio" name="gender" id="female" value="FEMALE"><label for="female">Female</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="accountType">Account Type</label></td>
                    <td>
                        <select name="accountType" id="accountType">
                            <option>Saving</option>
                            <option>Current</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for="aadharNumber">Aadhar Number</label></td>
                    <td><input type="text" id="aadharNumber" name="aadharNumber"></td>
                </tr>
                <tr>
                    <td><label for="panCard">PAN Card</label></td>
                    <td><input type="file" id="panCard" name="panCard"></td>
                </tr>
                <tr>
                    <td><label for="address">Address</label></td>
                    <td><textarea name="address" id="address"></textarea></td>
                </tr>
                <tr>
                    <td><label for="agree">Terms</label></td>
                    <td><input type="checkbox" id="agree" name="agree"> I Agree</td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
            </form>
        </center>
        <br>
    </main>
    <hr>
    <footer>
        <h3>
            <center>
                <Font color="green">copyright@manideep</Font>
            </center>
        </h3>
    </footer>
</body>

</html>
