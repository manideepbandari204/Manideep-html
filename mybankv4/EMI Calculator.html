<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bank App</title>
</head>

<body>
    <header>
        <center>
            <h1>
                <Font color="orange">Manideep</Font>
                <Font color="blue">Bank</Font>
            </h1>
            <a href="index.html">About Bank</a> |
            <a href="customerRegistrationForm.html">Customer Registration Form</a> |
            <a href="EMI Calculator.html">EMI Calculator</a> |
            <a href="Open New Bank Account.html">Open New Bank Account</a> |
            <a href="Customer Profile Update.html">Customer Profile Update</a> |
            <a href="Internet Bank Login.html">Internet Banking Login</a> |
            <a href="Credit Card Application.html">Credit Card Application</a> |
            <a href="Loan Eligibility Check.html">Loan Eligibility Check</a> |
            <a href="Branch feedback.html">Branches Feedback</a>
        </center>
    </header>
    <hr>
    <main>
        <br><br><br>
        <center>
            <form action="abcdeserver" method="post">
                <table border="1" cellpadding="10">
                    <caption>
                        <h2>EMI Calculator</h2>
                    </caption>
                    <tr>
                        <td><label for="loanAmount">Loan Amount</label></td>
                        <td><input type="number" id="loanAmount" name="loanAmount"></td>
                    </tr>
                    <tr>
                        <td><label for="interestRate">Interest Rate(%)</label></td>
                        <td><input type="number" id="interestRate" name="interestRate"></td>
                    </tr>
                    <tr>
                        <td><label for="loanTenure">Loan Tenure</label></td>
                        <td><input type="number" id="loanTenure" name="loanTenure"></td>
                    </tr>
                    <tr>
                        <td><label for="Tenure">Tenure Type</label></td>
                        <td>
                            <select id="Tenure" name="Tenure">
                                <option>Year</option>
                                <option>Month</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="emiStartDate">EMI Start Date</label></td>
                        <td>
                            <input type="date" id="emiStartDate" name="emiStartDate">
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Calculate">
                            <input type="submit" value="Reset">
                        </td>
                    </tr>
                </table>
            </form>
        </center>
        <br><br><br><br><br><br><br><br>
    </main>
    <hr>
    <footer>
        <h3>
            <center>
                <Font color="green">copyright@manideep</Font>
            </center>
        </h3>
    </footer>
</body>

</html>
